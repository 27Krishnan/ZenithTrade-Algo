name: Daily MCX & NSE OHLC Data Fetch

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/mcx_daily_fetch.yml'
      - 'mcx_bhavcopy/mcx_actions_fetcher.py'
      - 'nse_bhavcopy/nse_actions_fetcher.py'
  schedule:
    # 2:30 AM UTC = 8:00 AM IST (reliable off-peak slot; GCP pulls at 8:30 AM IST)
    - cron: '30 2 * * 1-5'  # Mon-Fri only
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  fetch-mcx-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager loguru python-dotenv

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable

      - name: Fetch MCX OHLC data
        run: |
          python mcx_bhavcopy/mcx_actions_fetcher.py 0
        env:
          MCX_FETCH_DAYS: '0'

      - name: Fetch NSE OHLC data
        run: |
          python nse_bhavcopy/nse_actions_fetcher.py

      - name: Check if data was updated
        id: check_changes
        run: |
          git diff --quiet data/mcx_ohlc/ data/nse_ohlc/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated CSV files
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Market Data Bot"
          git add data/mcx_ohlc/*.csv
          git add data/nse_ohlc/*.csv
          git commit -m "auto: MCX & NSE data update $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### MCX & NSE Data Fetch Complete" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date +'%Y-%m-%d %H:%M IST')" >> $GITHUB_STEP_SUMMARY
          echo "Files updated:" >> $GITHUB_STEP_SUMMARY
          ls -la data/mcx_ohlc/*.csv >> $GITHUB_STEP_SUMMARY
          ls -la data/nse_ohlc/*.csv >> $GITHUB_STEP_SUMMARY
