name: Daily MCX & NSE OHLC Data Fetch
run-name: Daily MCX & NSE OHLC Data Fetch - ${{ github.event_name }}

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/mcx_daily_fetch.yml'
      - 'mcx_bhavcopy/mcx_actions_fetcher.py'
      - 'nse_bhavcopy/nse_actions_fetcher.py'
  schedule:
    # GitHub scheduled workflows are queued by GitHub and can be delayed or
    # dropped during high-load minutes, especially at :00 and :30. Use IST
    # directly and stagger retries on quiet odd minutes before the 8 AM brief.
    - cron: '47 5 * * 1-5'  # 5:47 AM IST - early primary
      timezone: "Asia/Kolkata"
    - cron: '17 6 * * 1-5'  # 6:17 AM IST - backup 1
      timezone: "Asia/Kolkata"
    - cron: '47 6 * * 1-5'  # 6:47 AM IST - backup 2
      timezone: "Asia/Kolkata"
    - cron: '17 7 * * 1-5'  # 7:17 AM IST - backup 3
      timezone: "Asia/Kolkata"
    - cron: '47 7 * * 1-5'  # 7:47 AM IST - final pre-brief backup
      timezone: "Asia/Kolkata"
    - cron: '17 8 * * 1-5'  # 8:17 AM IST - recovery if GitHub delayed earlier slots
      timezone: "Asia/Kolkata"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

concurrency:
  group: daily-mcx-nse-ohlc-fetch
  cancel-in-progress: false

env:
  TZ: Asia/Kolkata

jobs:
  fetch-mcx-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show trigger and clock context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule || 'manual/push' }}"
          echo "UTC now: $(TZ=UTC date +'%Y-%m-%d %H:%M:%S %Z')"
          echo "IST now: $(TZ=Asia/Kolkata date +'%Y-%m-%d %H:%M:%S %Z')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager loguru python-dotenv

      - name: Install Chrome
        run: |
          # Modern method — no deprecated apt-key
          sudo install -m 0755 -d /etc/apt/keyrings
          wget -qO- https://dl.google.com/linux/linux_signing_key.pub | sudo tee /etc/apt/keyrings/google-chrome.asc > /dev/null
          sudo chmod a+r /etc/apt/keyrings/google-chrome.asc
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.asc] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Fetch MCX OHLC data
        run: |
          python mcx_bhavcopy/mcx_actions_fetcher.py 0
          echo "MCX_STATUS=$?" >> $GITHUB_ENV
        env:
          MCX_FETCH_DAYS: '0'

      - name: Fetch NSE OHLC data
        run: |
          python nse_bhavcopy/nse_actions_fetcher.py

      - name: Check if data was updated
        id: check_changes
        run: |
          git diff --quiet data/mcx_ohlc/ data/nse_ohlc/ || echo "changed=true" >>$GITHUB_OUTPUT

      - name: Commit and push updated CSV files
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Market Data Bot"

          git add data/mcx_ohlc/*.csv
          git add data/nse_ohlc/*.csv
          git commit -m "auto: MCX & NSE data update $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify GCP Server to auto-pull new data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "Notifying GCP server to pull latest data..."
          curl -s -X POST "http://34.70.33.149:8000/api/webhook/data-updated" \
            -H "Content-Type: application/json" \
            --max-time 10 \
            || echo "Server notification failed (server may be restarting) — data is on GitHub"

      - name: Summary
        run: |
          echo "### MCX & NSE Data Fetch Complete" >>$GITHUB_STEP_SUMMARY
          echo "Date: $(date +'%Y-%m-%d %H:%M IST')" >>$GITHUB_STEP_SUMMARY
          echo "Files updated:" >>$GITHUB_STEP_SUMMARY
          ls -la data/mcx_ohlc/*.csv >>$GITHUB_STEP_SUMMARY
          ls -la data/nse_ohlc/*.csv >>$GITHUB_STEP_SUMMARY
